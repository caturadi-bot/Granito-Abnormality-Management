<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GRANITO — Abnormality Management</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#EEF0F7;
  color:#111;
}

/* PAGE */
.page{
  min-height:100svh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px);
}

/* CARD */
.card{
  width:100%;
  max-width:420px;
  background:#F6F7FC;
  border-radius:28px;
  padding:28px 20px 32px;
  box-shadow:0 20px 40px rgba(0,0,0,.12);
  text-align:center;
}

/* HEADER */
.logo{
  width:150px;
  margin-bottom:12px;
  object-fit:contain;
}
h1{
  font-size:20px;
  margin:6px 0 2px;
}
.subtitle{
  font-size:15px;
  color:#666;
  margin-bottom:22px;
}

/* AREA LIST */
.area-list{
  display:flex;
  flex-direction:column;
  gap:14px;
}

/* AREA ITEM */
.area-item{
  background:#fff;
  border-radius:16px;
  padding:14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
  cursor:pointer;
  transition:transform .15s ease, box-shadow .15s ease;
}
.area-item:active{ transform:scale(.98); }

/* LEFT */
.area-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.icon{
  width:52px;
  height:52px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:transparent;
  overflow:hidden;
  flex:0 0 52px;
  box-shadow: 0 6px 18px rgba(0,0,0,.06);
}
.icon img{
  display:block;
  width:100%;
  height:100%;
  object-fit:contain;
}

/* TEXT */
.area-text{ text-align:left; }
.area-title{ font-weight:700; font-size:15px; }

/* CHEVRON */
.chevron{ font-size:22px; color:#9CA3AF; margin-left:8px; }

/* FOOTER */
.footer{ margin-top:22px; font-size:12px; color:#888; }

/* ===== SUB PAGE ===== */
.view{display:none}
.view.active{display:block}

.action-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:15px;
  font-weight:700;
  color:#fff;
  margin-bottom:12px;
  cursor:pointer;
}

.primary{background:#1F2933}
.muted{background:#6B7280}
.danger{background:#E53935}

.back-wrap{
  margin-top:16px;
  border-top:1px dashed #E5E7EB;
  padding-top:14px;
}

.back-btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:2px solid #E53935;
  background:#FFF5F5;
  color:#E53935;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>

<body>
<div class="page">
  <div class="card">

    <!-- LOGO -->
    <img class="logo" src="https://raw.githubusercontent.com/caturadi-bot/Granito_logo/main/logo%20granito.jpeg" alt="Granito Logo">

    <!-- SELECTOR -->
    <div id="selector" class="view active">
      <h1>Abnormality Management</h1>
      <div class="subtitle">Pilih Area Produksi</div>

      <div class="area-list">

        <div class="area-item" onclick="showView('body')">
          <div class="area-left">
            <div class="icon">
              <img src="https://raw.githubusercontent.com/caturadi-bot/Body-icon/main/a9abfffa-497a-41c1-afe4-f98b53c7e616.png">
            </div>
            <div class="area-text">
              <div class="area-title">Body Preparation</div>
            </div>
          </div>
          <div class="chevron">›</div>
        </div>

        <div class="area-item" onclick="showView('press')">
          <div class="area-left">
            <div class="icon">
              <img src="https://raw.githubusercontent.com/caturadi-bot/Body-icon/main/e6878303-4c5c-4923-a892-ffa42fa988c1.png">
            </div>
            <div class="area-text">
              <div class="area-title">Press Kiln</div>
            </div>
          </div>
          <div class="chevron">›</div>
        </div>

        <div class="area-item" onclick="showView('polish')">
          <div class="area-left">
            <div class="icon">
              <img src="https://raw.githubusercontent.com/caturadi-bot/Body-icon/main/ddff6995-363e-4aa2-9198-5a808695a489.png">
            </div>
            <div class="area-text">
              <div class="area-title">Polish & Sortir</div>
            </div>
          </div>
          <div class="chevron">›</div>
        </div>

      </div>

      <div class="footer">Created by Operation Excellence</div>
    </div>


    <!-- BODY PAGE -->
    <div id="body" class="view">
      <h1>Abnormality Management</h1>
      <div class="subtitle">Body Preparation</div>

      <button class="action-btn primary" onclick="openLink(CONFIG.body.create)">➕ Create Abnormality</button>
      <button class="action-btn muted" onclick="openLink(CONFIG.body.close)">✅ Closing Abnormality</button>
      <button class="action-btn danger" onclick="openLink(CONFIG.body.dashboard)">📊 Dashboard</button>
      <button class="action-btn muted" onclick="openLink(CONFIG.body.sheet)">📑 Spreadsheet</button>

      <div class="back-wrap">
        <button class="back-btn" onclick="showView('selector')">⬅ Kembali ke Pilihan Area</button>
      </div>
    </div>


    <!-- PRESS PAGE -->
    <div id="press" class="view">
      <h1>Abnormality Management</h1>
      <div class="subtitle">Press Kiln</div>

      <button class="action-btn primary" onclick="openLink(CONFIG.press.create)">➕ Create Abnormality</button>
      <button class="action-btn muted" onclick="openLink(CONFIG.press.close)">✅ Closing Abnormality</button>
      <button class="action-btn danger" onclick="openLink(CONFIG.press.dashboard)">📊 Dashboard</button>
      <button class="action-btn muted" onclick="openLink(CONFIG.press.sheet)">📑 Spreadsheet</button>

      <div class="back-wrap">
        <button class="back-btn" onclick="showView('selector')">⬅ Kembali ke Pilihan Area</button>
      </div>
    </div>


    <!-- POLISH PAGE -->
    <div id="polish" class="view">
      <h1>Abnormality Management</h1>
      <div class="subtitle">Polish & Sortir</div>

      <button class="action-btn primary" onclick="openLink(CONFIG.polish.create)">➕ Create Abnormality</button>
      <button class="action-btn muted" onclick="openLink(CONFIG.polish.close)">✅ Closing Abnormality</button>
      <button class="action-btn danger" onclick="openLink(CONFIG.polish.dashboard)">📊 Dashboard</button>
      <button class="action-btn muted" onclick="openLink(CONFIG.polish.sheet)">📑 Spreadsheet</button>

      <div class="back-wrap">
        <button class="back-btn" onclick="showView('selector')">⬅ Kembali ke Pilihan Area</button>
      </div>
    </div>

  </div>
</div>


<script>

const CONFIG = {

  body:{
    create:'https://docs.google.com/forms/d/e/1FAIpQLSdbb3e2qqIo_kJ9_wQWpA4jOnnskY5HMxbe2jzeAGeqWnbm_g/viewform?usp=dialog',
    close:'https://docs.google.com/forms/d/e/1FAIpQLSdkV1RIGyv2qPPuTWmplMM7EKOIhXaerDcwJsYmwLn7MPn6Gg/viewform?usp=dialog',
    dashboard:'https://lookerstudio.google.com/reporting/e7ae89ce-a1bd-44a4-b8f7-9f114f794870',
    sheet:'https://docs.google.com/spreadsheets/d/1XzaZEgDGeXn9n_4-XgbbLpjUaX_3_Pe5gW-Lz4KEYjQ/htmlview#gid=1146505316'
  },

  press:{
    create:'https://docs.google.com/forms/d/e/1FAIpQLSfpDjZwDGx6txxcr5msHKSO7gw2e74PQAUTvN9QpB5aFs_9_w/viewform?usp=dialog',
    close:'https://docs.google.com/forms/d/e/1FAIpQLSdEJ-d-eyigKURRbiU1yYaocZPbm4o8VqAZPk3vQMj2S6RTPQ/viewform?usp=header',
    dashboard:'https://lookerstudio.google.com/reporting/689d4a4b-62fb-433f-bd37-b9e13a09f210',
    sheet:'https://docs.google.com/spreadsheets/d/1a_8Pfl1W0gr1bXkTqfhi2CFEdf_0c810JCSzlPtBtGc/htmlview#gid=1146505316'
  },

  polish:{
    create:'https://docs.google.com/forms/d/e/1FAIpQLSdbm9pd9_rCP_u4E84QBQSaagYwFH4OspjQj-8vGZed7ui1uA/viewform?usp=dialog',
    close:'https://docs.google.com/forms/d/e/1FAIpQLSfVmpO0zBp7o8Gc-3csB1j_owkhY-4x7iuQOOBlRHxvMLAGDw/viewform?usp=dialog',
    dashboard:'https://lookerstudio.google.com/reporting/c0ef4699-10bb-4485-8df2-ed05ad447136',
    sheet:'https://docs.google.com/spreadsheets/d/1Hd0O4321QHco52lyFDeS3qVlL6NSo5lq8EWGp7RBB4k/htmlview#gid=1146505316'
  }

};

function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  try{history.replaceState(null,'','?area='+id);}catch(e){}
}

function openLink(url){
  window.open(url,'_blank');
}

const q=new URLSearchParams(location.search).get('area');
if(q && document.getElementById(q)) showView(q);

</script>

</body>
</html>
